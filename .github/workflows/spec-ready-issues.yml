name: Spec Ready Issues

# Runs an Oz cloud agent when an issue receives a ready-to-spec label.
# The agent follows .agents/skills/spec/SKILL.md to delegate to the
# write-product-spec and write-tech-spec common skills, create PRODUCT.md and
# TECH.md, open a specs PR, and report progress back to the issue.

on:
  issues:
    types: [labeled]

concurrency:
  group: spec-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  spec:
    name: Spec issue
    runs-on: ubuntu-latest
    if: >-
      github.event.label.name == 'Ready to spec' ||
      github.event.label.name == 'ready-to-spec' ||
      github.event.label.name == 'ready to spec'
    permissions:
      contents: write        # let the agent commit and push a specs branch
      issues: write          # let the agent post progress and update labels
      pull-requests: write   # let the agent open the specs PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install common spec skills
        run: npx skills add warpdotdev/common-skills --skill write-product-spec --skill write-tech-spec --agent warp --yes

      - name: Spec issue with Oz agent
        uses: warpdotdev/oz-agent-action@v1
        id: spec
        env:
          # Authenticates the `gh` CLI the agent uses for issues and labels.
          GH_TOKEN: ${{ github.token }}
        with:
          skill: spec
          name: "Spec issue #${{ github.event.issue.number }}"
          prompt: |
            Create checked-in product and technical specs for the GitHub issue that was just labeled ready to spec.

            - Repository: ${{ github.repository }}
            - Issue number: #${{ github.event.issue.number }}
            - Issue URL: ${{ github.event.issue.html_url }}
            - Applied label: ${{ github.event.label.name }}

            Follow the spec skill: fetch the full issue and comments with the
            authenticated `gh` CLI, verify `.agents/skills/write-product-spec`
            and `.agents/skills/write-tech-spec` are installed, read
            `roadmap.md` and `vision.md` if present, inspect this checked-out
            codebase, and use those common skills to create:

            - `specs/<issue-slug>/PRODUCT.md`
            - `specs/<issue-slug>/TECH.md`

            Create a specs branch, commit the spec files, push the branch, and
            open a GitHub pull request for review. Post status comments as
            directed by the skill, using only an Oz run or Oz session URL as
            the follow-along link. Do not use the GitHub Actions workflow URL
            as the follow-along link.

            Do not implement the issue. Do not apply `Ready to implement`
            until the specs PR has been reviewed or the repository explicitly
            treats authored specs as implementation-ready without review.
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}
